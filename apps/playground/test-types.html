<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Monaco Types</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui;
        }
        #container {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Monaco Editor Type Test</h1>
    <div id="container"></div>
    <div id="output">Loading...</div>

    <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script type="module">
        const output = document.getElementById('output');
        
        require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' } });
        
        require(['vs/editor/editor.main'], function() {
            output.textContent = 'Monaco loaded. Setting up types...';
            
            // Add BlaC type definitions
            const blacTypes = `
declare module '@blac/core' {
  export type BlocEventConstraint = object;
  
  export abstract class BlocBase<S> {
    uid: string;
    _state: S;
    _name: string;
    
    constructor(initialState: S);
    
    get state(): S;
    subscribe(callback: (state: S) => void): () => void;
    dispose(): Promise<void>;
  }
  
  export abstract class Cubit<S> extends BlocBase<S> {
    emit(state: S): void;
    patch(statePatch: S extends object ? Partial<S> : S, ignoreChangeCheck?: boolean): void;
  }
  
  export abstract class Bloc<S, A extends BlocEventConstraint = BlocEventConstraint> extends BlocBase<S> {
    protected on<E extends A>(
      eventConstructor: new (...args: any[]) => E,
      handler: (event: E, emit: (newState: S) => void) => void | Promise<void>
    ): void;
    
    add: (action: A) => Promise<void>;
  }
}
`;
            
            monaco.languages.typescript.typescriptDefaults.addExtraLib(
                blacTypes,
                'file:///node_modules/@blac/core/index.d.ts'
            );
            
            // Configure TypeScript options
            monaco.languages.typescript.typescriptDefaults.setCompilerOptions({
                target: monaco.languages.typescript.ScriptTarget.ES2020,
                module: monaco.languages.typescript.ModuleKind.ESNext,
                moduleResolution: monaco.languages.typescript.ModuleResolutionKind.NodeJs,
                allowNonTsExtensions: true,
                allowSyntheticDefaultImports: true,
                strict: false,
            });
            
            // Create test code
            const testCode = `import { Cubit } from '@blac/core';

class CounterCubit extends Cubit<{ count: number }> {
  constructor() {
    super({ count: 0 });
  }
  
  increment = () => {
    // Test if patch method is recognized
    this.patch({ count: this.state.count + 1 });
  };
  
  decrement = () => {
    // Test if emit method is recognized
    this.emit({ count: this.state.count - 1 });
  };
}

// Test instantiation
const counter = new CounterCubit();
counter.increment();
console.log(counter.state.count);
`;
            
            // Create editor
            const editor = monaco.editor.create(document.getElementById('container'), {
                value: testCode,
                language: 'typescript',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
            });
            
            // Check for errors after a delay
            setTimeout(() => {
                const model = editor.getModel();
                monaco.editor.getModelMarkers({ resource: model.uri }).forEach(marker => {
                    output.textContent += `\nError at line ${marker.startLineNumber}: ${marker.message}`;
                });
                
                if (monaco.editor.getModelMarkers({ resource: model.uri }).length === 0) {
                    output.textContent = '✅ No TypeScript errors! Types are working correctly.';
                } else {
                    output.textContent = '❌ TypeScript errors found:\n' + output.textContent;
                }
            }, 2000);
        });
    </script>
</body>
</html>
