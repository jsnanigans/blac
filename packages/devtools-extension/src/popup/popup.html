<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlaC DevTools</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      margin: 0;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 15px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4CAF50;
    }

    .info {
      font-size: 14px;
      color: #888;
      line-height: 1.5;
    }

    .open-devtools {
      margin-top: 15px;
      padding: 8px 16px;
      background: #007ACC;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }

    .open-devtools:hover {
      background: #005a9e;
    }
  </style>
</head>
<body>
  <h1>BlaC DevTools</h1>
  <div class="status">
    <span class="status-indicator"></span>
    <span>Extension Active</span>
  </div>
  <div class="info">
    Open Developer Tools and navigate to the "BlaC" tab to inspect your application's state.
  </div>
  <button class="open-devtools" id="openDevTools">
    Open Developer Tools
  </button>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
